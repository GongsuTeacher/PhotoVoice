<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강원 아이로 연구학교 포토보이스 전시</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #2563eb; 
            --light-blue: #f0f6ff;
            --card-blue-bg: #f4f8ff; 
            --bg-gradient: linear-gradient(135deg, #edf4fc 0%, #ffffff 100%);
            --card-bg: #ffffff;
            --text-main: #1e293b; 
            --text-muted: #64748b;
            --divider-color: #cbd5e1;
            --shadow-sm: 0 4px 6px -1px rgba(37, 99, 235, 0.06);
            --shadow-lg: 0 20px 40px -5px rgba(37, 99, 235, 0.12);
        }
        
        * {
            box-sizing: border-box;
            font-family: 'Pretendard', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 데이터 로딩 오버레이 */
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            color: var(--primary-blue);
            font-weight: 800;
        }

        .spinner {
            font-size: 3rem;
            margin-bottom: 20px;
            animation: spin 2s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .global-header {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid rgba(37, 99, 235, 0.15);
            box-shadow: var(--shadow-sm);
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--primary-blue);
        }

        .page {
            display: none;
            min-height: 100vh;
            padding: 100px 20px 60px 20px;
            position: relative;
        }
        .page.active {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #landing-page.active {
            justify-content: center;
            padding-top: 80px;
        }

        .hero-camera-container {
            font-size: 4.5rem;
            margin-bottom: 10px;
            animation: float 3s infinite ease-in-out;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
            cursor: default;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(3deg); }
        }

        .pv-badge {
            background: var(--light-blue);
            padding: 6px 20px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 800;
            color: var(--primary-blue);
            letter-spacing: 0.05em;
            margin-bottom: 20px;
            border: 1px solid rgba(37, 99, 235, 0.1);
            box-shadow: var(--shadow-sm);
        }

        .main-title {
            text-align: center;
            margin-bottom: 15px;
            line-height: 1.4;
            letter-spacing: -0.02em;
        }

        .title-line1 {
            font-size: 2.8rem;
            font-weight: 800;
            color: var(--primary-blue);
            display: block;
        }

        .title-line2 {
            font-size: 2.8rem;
            font-weight: 800;
            color: var(--text-main);
            display: block;
            margin-top: 5px;
        }

        .subtitle {
            font-size: 1.25rem;
            color: var(--text-muted);
            margin-bottom: 30px;
            text-align: center;
            font-weight: 400;
        }

        .title-divider {
            width: 100%;
            max-width: 900px;
            height: 1px;
            background-color: var(--divider-color);
            margin-bottom: 40px;
            border: none;
            opacity: 0.6;
        }

        /* 12개 항목 6칸씩 2줄 배열로 최적화 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 16px;
            width: 100%;
            max-width: 1400px;
        }

        .grade-card {
            background: var(--card-blue-bg);
            border-radius: 16px;
            padding: 24px 12px;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #e2eaf8;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            min-height: 95px;
        }

        .card-bottom-line {
            position: absolute;
            left: 0;
            bottom: 0;
            right: 0;
            height: 2px; 
            background: #93c5fd; 
            border-bottom-left-radius: 16px;
            border-bottom-right-radius: 16px;
        }

        .card-content-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card-name-text {
            font-size: 1.35rem; 
            font-weight: 800;
            color: var(--text-main);
            text-align: center;
            transition: color 0.2s;
            word-break: keep-all;
        }

        .card-icon-area {
            position: absolute;
            right: 5px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-arrow-circle {
            position: absolute;
            width: 32px;
            height: 32px;
            background: rgba(37, 99, 235, 0.08);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-emoji-hover {
            position: absolute;
            font-size: 1.6rem;
            opacity: 0;
            transform: scale(0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            white-space: nowrap;
        }

        .apple-tree-box {
            position: relative;
            display: inline-block;
            font-size: 1.6rem;
            line-height: 1;
        }
        .apple {
            position: absolute;
            font-size: 0.5rem;
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.2));
        }
        .apple.a1 { top: 2px; left: 5px; }
        .apple.a2 { top: 6px; right: 1px; }
        .apple.a3 { top: 13px; left: 11px; }

        .grade-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
            background: #ffffff;
            border-color: #93c5fd; 
        }

        .grade-card:hover .card-name-text { color: var(--primary-blue); }
        .grade-card:hover .card-arrow-circle { opacity: 0; transform: scale(0.3); }
        .grade-card:hover .card-emoji-hover { opacity: 1; transform: scale(1.1); }

        .top-nav {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 30px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-home {
            padding: 12px 24px;
            border-radius: 50px;
            border: 1px solid var(--divider-color);
            background: var(--card-bg);
            color: var(--text-main);
            font-size: 1rem;
            cursor: pointer;
            font-weight: 700;
            box-shadow: var(--shadow-sm);
            transition: 0.2s;
            margin-right: auto;
        }
        .btn-home:hover { background: #f1f5f9; color: var(--primary-blue); }

        .grade-nav {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            background: white;
            padding: 6px;
            border-radius: 50px;
            box-shadow: var(--shadow-sm);
            border: 1px solid #edf2f7;
            justify-content: center;
        }

        .nav-btn {
            padding: 8px 12px;
            border-radius: 50px;
            border: none;
            background: transparent;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
        }
        .nav-btn:hover { color: var(--primary-blue); background: var(--light-blue); }
        .nav-btn.active { background: var(--primary-blue); color: white; }

        .sub-category-container {
            display: none;
            gap: 12px;
            margin-bottom: 25px;
            background: #e2e8f0;
            padding: 5px;
            border-radius: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .sub-cat-btn {
            padding: 8px 24px;
            border: none;
            background: transparent;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 700;
            color: #475569;
            cursor: pointer;
        }
        .sub-cat-btn.active { background: white; color: var(--primary-blue); box-shadow: var(--shadow-sm); }

        .tab-container {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            background: white;
            padding: 6px;
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            border: 1px solid #edf2f7;
        }

        .tab-btn {
            padding: 12px 50px;
            font-size: 1.1rem;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 700;
            transition: 0.2s;
        }
        .tab-btn.active { background: var(--primary-blue); color: white; }

        .instruction-badge {
            background: var(--light-blue);
            color: var(--primary-blue);
            padding: 10px 24px;
            border-radius: 50px;
            font-size: 1.05rem;
            font-weight: 700;
            margin-top: 15px; 
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 6px;
            animation: bounce 2s infinite ease-in-out;
            border: 1px solid rgba(37, 99, 235, 0.15);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .content-area {
            display: flex;
            gap: 40px;
            width: 100%;
            max-width: 1200px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card-wrapper {
            flex: 1;
            min-width: 320px;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card-label {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 15px;
            color: var(--text-main);
            background: white;
            padding: 10px 35px;
            border-radius: 50px;
            box-shadow: var(--shadow-sm);
            border: 2px solid #e2e8f0;
        }

        .flip-card {
            background-color: transparent;
            width: 100%;
            aspect-ratio: 4/3;
            perspective: 1000px;
            cursor: pointer;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.7s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }

        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }

        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            background: var(--card-bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 15px;
            overflow: hidden;
        }

        .flip-card-front { border: 1px solid #edf2f7; }
        .flip-card-front img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }

        .no-image {
            color: var(--text-muted);
            font-size: 1.15rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            background: #f8fafc;
            width: 100%;
            height: 100%;
            justify-content: center;
            border-radius: 12px;
            border: 2px dashed #cbd5e1;
        }

        .flip-card-back { transform: rotateY(180deg); border: 3px solid var(--primary-blue); padding: 24px; }

        .reflection-text {
            font-size: 1.35rem;
            line-height: 1.7;
            margin-bottom: 15px;
            flex-grow: 1;
            display: flex;
            align-items: center;
            text-align: center;
            width: 100%;
            color: var(--text-main);
            word-break: keep-all;
            overflow-y: auto;
        }

        .tts-btn {
            background: var(--light-blue);
            border: 1px solid rgba(37, 99, 235, 0.2);
            color: var(--primary-blue);
            padding: 10px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.05rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: var(--shadow-sm);
        }
        .tts-btn:hover { background: var(--primary-blue); color: white; }

        .edit-controls { display: none; width: 100%; flex-direction: column; gap: 10px; height: 100%; }
        .edit-mode .edit-controls { display: flex; }
        .edit-mode .tts-btn { display: none; }

        .image-action-bar {
            display: flex;
            gap: 10px;
            align-items: center;
            width: 100%;
            margin-bottom: 5px;
        }

        .delete-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 700;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .delete-btn:hover { background: #dc2626; }

        textarea {
            width: 100%;
            flex-grow: 1;
            padding: 12px;
            font-size: 1.15rem;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            resize: none;
            outline: none;
        }
        textarea:focus { border-color: var(--primary-blue); }

        .save-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 700;
        }

        .admin-gear-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 48px;
            height: 48px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: var(--shadow-lg);
            z-index: 2000;
            transition: transform 0.4s ease, background-color 0.2s;
        }
        .admin-gear-btn:hover { transform: rotate(45deg); background: #f1f5f9; }
        .admin-gear-btn.active-mode { background: #ef4444; color: white; border-color: #ef4444; }

        /* 댓글 영역 스타일 */
        .comment-section {
            width: 100%;
            max-width: 1200px;
            margin-top: 60px;
            background: white;
            border-radius: 16px;
            padding: 35px;
            box-shadow: var(--shadow-sm);
            border: 1px solid #e2e8f0;
        }
        .comment-section h3 {
            margin-top: 0;
            color: var(--primary-blue);
            font-size: 1.5rem;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .comment-input-area {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #edf2f7;
        }
        .comment-input-area input {
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            flex: 1;
            min-width: 200px;
        }
        .comment-input-area textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1.1rem;
            resize: vertical;
            min-height: 90px;
        }
        .comment-input-area textarea:focus, .comment-input-area input:focus {
            border-color: var(--primary-blue);
            outline: none;
        }
        .comment-submit-btn {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-left: auto;
            transition: 0.2s;
        }
        .comment-submit-btn:hover { background: #1d4ed8; }
        
        .comment-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .comment-item {
            background: var(--card-blue-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e2eaf8;
            position: relative;
        }
        .comment-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 0.95rem;
            color: var(--text-muted);
        }
        .comment-author {
            font-weight: 800;
            color: var(--text-main);
            font-size: 1.1rem;
        }
        .comment-text {
            font-size: 1.15rem;
            line-height: 1.6;
            word-break: break-all;
            color: var(--text-main);
        }
        .comment-actions {
            position: absolute;
            top: 15px;
            right: 20px;
            display: flex;
            gap: 10px;
        }
        .comment-btn {
            background: transparent;
            border: none;
            font-size: 0.95rem;
            font-weight: 600;
            color: #94a3b8;
            cursor: pointer;
            padding: 0;
        }
        .comment-btn:hover { color: var(--primary-blue); text-decoration: underline; }

        @media (max-width: 1200px) {
            .grid-container { grid-template-columns: repeat(4, 1fr); }
        }
        @media (max-width: 768px) {
            .title-line1, .title-line2 { font-size: 2rem; }
            .grid-container { grid-template-columns: repeat(3, 1fr); }
            .content-area { flex-direction: column; }
            .top-nav { flex-direction: column; align-items: center; }
            .btn-home { margin-right: 0; width: 100%; text-align: center; }
        }
        @media (max-width: 480px) {
            .grid-container { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner">⏳</div>
        <div>클라우드 전시관에 연결 중입니다...</div>
    </div>

    <div class="global-header">
        상평초 본분교 강원AI-ro 연구학교 포토보이스
    </div>

    <div id="landing-page" class="page">
        <div class="hero-camera-container">📸</div>
        <div class="pv-badge">PHOTOVOICE · 사진으로 말하다 (2025-2026)</div>

        <div class="main-title">
            <span class="title-line1">상평초등학교 (공수전, 오색분교)</span>
            <span class="title-line2">강원 AI-ro 연구학교 포토보이스</span>
        </div>
        <div class="subtitle">연구학교를 운영한 선생님들의 생각을 포토보이스로 만나보세요.</div>
        
        <hr class="title-divider">

        <div class="grid-container" id="grade-grid">
            </div>
    </div>

    <div id="detail-page" class="page">
        <div class="top-nav">
            <button class="btn-home" onclick="goHome()">🏠 홈으로 (처음으로)</button>
            <div class="grade-nav" id="grade-nav-container"></div>
        </div>

        <h1 id="detail-title" style="font-size: 2.2rem; margin: 10px 0 15px 0;">학년</h1>

        <div class="sub-category-container" id="sub-category-area">
            </div>

        <div class="tab-container">
            <button class="tab-btn active" onclick="setYear(1)" id="tab-year1">1년차</button>
            <button class="tab-btn" onclick="setYear(2)" id="tab-year2">2년차</button>
        </div>

        <div class="instruction-badge">
            👇 이미지를 클릭하면 선생님들의 생생한 소감을 확인할 수 있습니다
        </div>

        <div class="content-area">
            <div class="card-wrapper">
                <div class="card-label">사 전</div>
                <div class="flip-card" onclick="toggleFlip(this, event)">
                    <div class="flip-card-inner">
                        <div class="flip-card-front" id="pre-front"></div>
                        <div class="flip-card-back">
                            <div class="reflection-text" id="pre-text"></div>
                            <div class="edit-controls" onclick="event.stopPropagation()">
                                <label style="font-size:0.9rem; color:var(--text-muted); text-align:left; width:100%;">📷 이미지 업로드 (서버 연동):</label>
                                <div class="image-action-bar">
                                    <input type="file" accept="image/*" onchange="uploadImage('pre', this)" style="flex:1; font-size:0.9rem;">
                                    <button class="delete-btn" onclick="deleteImage('pre')">🗑️ 삭제</button>
                                </div>
                                <textarea id="pre-input" placeholder="소감을 입력해 주세요..."></textarea>
                                <button class="save-btn" onclick="saveData('pre')">💾 텍스트/이미지 서버에 저장</button>
                            </div>
                            <button class="tts-btn" onclick="speakText('pre', event)">🔈 음성으로 읽어주기</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card-wrapper">
                <div class="card-label">사 후</div>
                <div class="flip-card" onclick="toggleFlip(this, event)">
                    <div class="flip-card-inner">
                        <div class="flip-card-front" id="post-front"></div>
                        <div class="flip-card-back">
                            <div class="reflection-text" id="post-text"></div>
                            <div class="edit-controls" onclick="event.stopPropagation()">
                                <label style="font-size:0.9rem; color:var(--text-muted); text-align:left; width:100%;">📷 이미지 업로드 (서버 연동):</label>
                                <div class="image-action-bar">
                                    <input type="file" accept="image/*" onchange="uploadImage('post', this)" style="flex:1; font-size:0.9rem;">
                                    <button class="delete-btn" onclick="deleteImage('post')">🗑️ 삭제</button>
                                </div>
                                <textarea id="post-input" placeholder="소감을 입력해 주세요..."></textarea>
                                <button class="save-btn" onclick="saveData('post')">💾 텍스트/이미지 서버에 저장</button>
                            </div>
                            <button class="tts-btn" onclick="speakText('post', event)">🔈 음성으로 읽어주기</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="comment-section">
            <h3>💬 선생님들께 응원의 댓글을 남겨주세요</h3>
            <div class="comment-input-area">
                <input type="text" id="comment-author" placeholder="작성자 (이름/닉네임)" maxlength="20">
                <input type="password" id="comment-password" placeholder="비밀번호 (수정/삭제용 4자리 이상)" maxlength="20">
                <textarea id="comment-text" maxlength="300" placeholder="따뜻한 응원 글을 남겨주세요! (최대 300자, 키보드 이모티콘 😊 사용 가능)"></textarea>
                <button class="comment-submit-btn" onclick="addComment()">등록하기</button>
            </div>
            <div id="comment-list" class="comment-list">
                </div>
        </div>
    </div>

    <div class="admin-gear-btn" id="gear-btn" onclick="triggerAdminSystem()" title="관리자 모드 전환">⚙️</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDH0Juuc6OpXFaVQCkVS-FojASE25O9zvs",
            authDomain: "photovoice-b7c20.firebaseapp.com",
            projectId: "photovoice-b7c20",
            storageBucket: "photovoice-b7c20.firebasestorage.app",
            messagingSenderId: "745117733198",
            appId: "1:745117733198:web:79233ce4f8ae75839bce1f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // 총 12개 항목 구성 (공수전분교, 오색분교 추가)
        const gradeDataList = [
            { id: "1학년", name: "1학년", emoji: "🌱" },
            { id: "2학년", name: "2학년", emoji: "🌿" },
            { id: "3학년", name: "3학년", emoji: "🌸" },
            { id: "4학년", name: "4학년", emoji: "🌲" },
            { id: "5학년", name: "5학년", emoji: "🌳" },
            { id: "6학년", name: "6학년", emoji: "APPLE_TREE" },
            { id: "전담(과학)", name: "전담(과학)", emoji: "🔬" },
            { id: "비교과", name: "비교과", emoji: "🩺🍱" },
            { id: "공수전분교", name: "공수전분교", emoji: "🏫" },
            { id: "오색분교", name: "오색분교", emoji: "🏫" },
            { id: "교감", name: "교감", emoji: "🏫" },
            { id: "교장", name: "교장", emoji: "🏫" }
        ];

        // 서브 카테고리를 갖는 항목들 정의
        const subCategoryTypes = {
            "비교과": ["보건", "영양"],
            "공수전분교": ["교사A", "교사B"],
            "오색분교": ["교사A", "교사B"]
        };

        let currentGrade = "";
        let currentSubCategory = "";
        let currentYear = 1;
        let isAdmin = false;

        let defaultData = {};
        gradeDataList.forEach(item => {
            if (subCategoryTypes[item.id]) {
                defaultData[item.id] = {};
                subCategoryTypes[item.id].forEach(sub => {
                    defaultData[item.id][sub] = {
                        1: { pre: { img: "", text: "" }, post: { img: "", text: "" }, comments: [] },
                        2: { pre: { img: "", text: "" }, post: { img: "", text: "" }, comments: [] }
                    };
                });
            } else {
                defaultData[item.id] = {
                    1: { pre: { img: "", text: "" }, post: { img: "", text: "" }, comments: [] },
                    2: { pre: { img: "", text: "" }, post: { img: "", text: "" }, comments: [] }
                };
            }
        });

        let exhibitionData = {};

        async function loadDataFromFirebase() {
            try {
                const docRef = doc(db, "exhibition", "photovoiceData");
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists()) {
                    exhibitionData = docSnap.data();
                    // 기존 데이터에 새로 추가된 구조(공수전, 오색 등)가 없다면 자동 병합
                    gradeDataList.forEach(item => {
                        if (!exhibitionData[item.id]) exhibitionData[item.id] = defaultData[item.id];
                    });
                } else {
                    exhibitionData = defaultData;
                    await setDoc(docRef, exhibitionData); 
                }
            } catch (error) {
                console.error("데이터베이스 연결 실패:", error);
                exhibitionData = defaultData; 
            } finally {
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('landing-page').classList.add('active');
                initUI();
            }
        }

        function initUI() {
            const grid = document.getElementById('grade-grid');
            const nav = document.getElementById('grade-nav-container');
            
            gradeDataList.forEach(item => {
                const card = document.createElement('div');
                card.className = 'grade-card';
                
                let emojiMarkup = "";
                if(item.emoji === "APPLE_TREE") {
                    emojiMarkup = `<div class="apple-tree-box">🌳<span class="apple a1">🍎</span><span class="apple a2">🍎</span><span class="apple a3">🍎</span></div>`;
                } else {
                    emojiMarkup = `<span>${item.emoji}</span>`;
                }

                card.innerHTML = `
                    <div class="card-bottom-line"></div>
                    <div class="card-content-wrapper">
                        <span class="card-name-text">${item.name}</span>
                        <div class="card-icon-area">
                            <div class="card-arrow-circle">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M12 5l7 7-7 7" stroke="#2563eb" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                            </div>
                            <div class="card-emoji-hover">${emojiMarkup}</div>
                        </div>
                    </div>
                `;
                card.onclick = () => window.openDetail(item.id);
                grid.appendChild(card);

                const navBtn = document.createElement('button');
                navBtn.className = 'nav-btn';
                navBtn.id = `nav-${item.id}`;
                navBtn.innerText = item.name;
                navBtn.onclick = () => window.openDetail(item.id);
                nav.appendChild(navBtn);
            });
        }

        window.goHome = function() {
            document.getElementById('detail-page').classList.remove('active');
            document.getElementById('landing-page').classList.add('active');
            window.speechSynthesis.cancel();
        }

        window.openDetail = function(gradeId) {
            currentGrade = gradeId;
            document.getElementById('landing-page').classList.remove('active');
            document.getElementById('detail-page').classList.add('active');
            
            const subArea = document.getElementById('sub-category-area');
            if (subCategoryTypes[gradeId]) {
                subArea.style.display = 'flex';
                const subs = subCategoryTypes[gradeId];
                subArea.innerHTML = subs.map((sub, index) => 
                    `<button class="sub-cat-btn ${index === 0 ? 'active' : ''}" id="sub-cat-${sub}" onclick="setSubCategory('${sub}')">${sub} 연구 소감</button>`
                ).join('');
                currentSubCategory = subs[0];
                document.getElementById('detail-title').innerText = `${gradeId} (${currentSubCategory}) 연구 소감`;
            } else {
                subArea.style.display = 'none';
                currentSubCategory = "";
                document.getElementById('detail-title').innerText = `${gradeId} 선생님의 연구 소감`;
            }

            window.setYear(1);

            gradeDataList.forEach(item => {
                const target = document.getElementById(`nav-${item.id}`);
                if(target) target.classList.toggle('active', item.id === gradeId);
            });
            window.scrollTo(0, 0);
        }

        window.setSubCategory = function(subType) {
            currentSubCategory = subType;
            const subs = subCategoryTypes[currentGrade];
            subs.forEach(sub => {
                const btn = document.getElementById(`sub-cat-${sub}`);
                if(btn) btn.classList.toggle('active', sub === subType);
            });
            document.getElementById('detail-title').innerText = `${currentGrade} (${currentSubCategory}) 연구 소감`;
            resetFlips();
            renderCards();
            window.renderComments();
        }

        window.setYear = function(year) {
            currentYear = year;
            document.getElementById('tab-year1').classList.toggle('active', year === 1);
            document.getElementById('tab-year2').classList.toggle('active', year === 2);
            resetFlips();
            renderCards();
            window.renderComments();
        }

        function resetFlips() {
            document.querySelectorAll('.flip-card').forEach(card => card.classList.remove('flipped'));
            window.speechSynthesis.cancel();
        }

        function getDataNode() {
            if (subCategoryTypes[currentGrade]) {
                return exhibitionData[currentGrade][currentSubCategory][currentYear];
            } else {
                return exhibitionData[currentGrade][currentYear];
            }
        }

        function renderCards() {
            const data = getDataNode();
            if(!data) return;

            ['pre', 'post'].forEach(type => {
                const front = document.getElementById(`${type}-front`);
                const textElem = document.getElementById(`${type}-text`);
                const inputArea = document.getElementById(`${type}-input`);
                
                if (data[type] && data[type].img) {
                    front.innerHTML = `<img src="${data[type].img}" alt="포토보이스">`;
                } else {
                    front.innerHTML = `
                        <div class="no-image">
                            <span style="font-size:2rem;">📸</span>
                            <span>이미지를 등록해주세요</span>
                        </div>`;
                }
                
                const savedText = data[type] ? data[type].text : "";
                textElem.innerText = savedText || "선생님의 소감이 아직 등록되지 않았습니다.";
                if(inputArea) inputArea.value = savedText;
            });
        }

        window.toggleFlip = function(element, event) {
            if(isAdmin && event.target.closest('.edit-controls')) return; 
            element.classList.toggle('flipped');
        }

        window.speakText = function(type, event) {
            event.stopPropagation();
            const data = getDataNode();
            const text = data[type].text;
            
            if (!text) return alert("읽어드릴 소감 텍스트가 없습니다.");
            if (!window.speechSynthesis) return alert("이 기기는 TTS 기능을 지원하지 않습니다.");

            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ko-KR';
            utterance.rate = 0.95; 
            window.speechSynthesis.speak(utterance);
        }

        window.triggerAdminSystem = function() {
            const gearBtn = document.getElementById('gear-btn');
            
            if (isAdmin) {
                if(confirm("관리자 편집 모드를 해제하고 감상 모드로 돌아가시겠습니까?")) {
                    isAdmin = false;
                    gearBtn.classList.remove('active-mode');
                    document.querySelectorAll('.flip-card-back').forEach(card => card.classList.remove('edit-mode'));
                    document.querySelectorAll('.reflection-text').forEach(t => t.style.display = 'flex');
                    renderCards();
                    window.renderComments(); // 댓글 관리자 버튼 숨기기 위함
                }
                return;
            }

            const password = prompt("관리자 인증 비밀번호를 입력해주세요:");
            if (password === "sp4268!!") {
                isAdmin = true;
                gearBtn.classList.add('active-mode');
                alert("인증 완료! 카드를 뒤집어 실시간 데이터 수정 및 모든 댓글 관리가 가능합니다.");
                document.querySelectorAll('.flip-card-back').forEach(card => card.classList.add('edit-mode'));
                document.querySelectorAll('.reflection-text').forEach(t => t.style.display = 'none');
                renderCards();
                window.renderComments(); // 댓글 관리자 버튼 활성화 위함
            } else if (password !== null) {
                alert("비밀번호가 잘못되었습니다.");
            }
        }

        window.uploadImage = async function(type, inputElem) {
            const file = inputElem.files[0];
            if (!file) return;

            alert("사진을 클라우드 서버로 업로드합니다. 잠시만 기다려주세요...");
            
            try {
                const subStr = currentSubCategory ? `_${currentSubCategory}` : "";
                const filename = `images/${currentGrade}${subStr}_${currentYear}_${type}_${Date.now()}`;
                const storageRef = ref(storage, filename);
                
                const snapshot = await uploadBytes(storageRef, file);
                const downloadURL = await getDownloadURL(snapshot.ref);
                
                const data = getDataNode();
                data[type].img = downloadURL;
                renderCards(); 
                
                alert("✅ 업로드 완료! 반드시 [텍스트/이미지 서버에 저장] 버튼을 눌러야 반영됩니다.");
            } catch (error) {
                console.error("업로드 에러:", error);
                alert("사진 업로드 중 오류가 발생했습니다.");
            }
        }

        window.deleteImage = function(type) {
            if(!confirm("등록된 이미지를 삭제하시겠습니까? (삭제 후 '저장'을 눌러야 반영됩니다)")) return;
            const data = getDataNode();
            data[type].img = ""; 
            renderCards(); 
        }

        window.saveData = async function(type) {
            const textVal = document.getElementById(`${type}-input`).value;
            const data = getDataNode();
            data[type].text = textVal;
            
            try {
                const docRef = doc(db, "exhibition", "photovoiceData");
                await setDoc(docRef, exhibitionData);
                alert("구글 클라우드 서버에 데이터가 성공적으로 저장 및 동기화되었습니다.");
                renderCards();
            } catch (error) {
                console.error("저장 에러:", error);
                alert("데이터 저장 중 오류가 발생했습니다.");
            }
        }

        // ---------- 댓글 기능 모듈 ----------

        window.addComment = async function() {
            const author = document.getElementById('comment-author').value.trim();
            const password = document.getElementById('comment-password').value.trim();
            const text = document.getElementById('comment-text').value.trim();

            if(!author || !password || !text) {
                alert("작성자, 비밀번호, 댓글 내용을 모두 입력해주세요.");
                return;
            }

            const data = getDataNode();
            if(!data.comments) data.comments = [];

            const newComment = {
                id: Date.now(),
                author: author,
                password: password,
                text: text,
                date: new Date().toLocaleString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' })
            };

            data.comments.push(newComment);

            try {
                const docRef = doc(db, "exhibition", "photovoiceData");
                await setDoc(docRef, exhibitionData);
                
                document.getElementById('comment-author').value = '';
                document.getElementById('comment-password').value = '';
                document.getElementById('comment-text').value = '';
                
                window.renderComments();
                alert("소중한 댓글이 등록되었습니다!");
            } catch (error) {
                console.error(error);
                alert("댓글 등록에 실패했습니다.");
            }
        }

        window.renderComments = function() {
            const data = getDataNode();
            const commentList = document.getElementById('comment-list');
            const comments = data.comments || [];

            if(comments.length === 0) {
                commentList.innerHTML = '<div style="text-align:center; color:#94a3b8; padding: 25px; font-size: 1.1rem;">아직 작성된 댓글이 없습니다. 첫 번째 응원의 글을 남겨주세요!</div>';
                return;
            }

            commentList.innerHTML = comments.map(c => `
                <div class="comment-item">
                    <div class="comment-header">
                        <span class="comment-author">${c.author}</span>
                        <span>${c.date}</span>
                    </div>
                    <div class="comment-text">${c.text}</div>
                    <div class="comment-actions">
                        <button class="comment-btn" onclick="editComment(${c.id})">수정</button>
                        <button class="comment-btn" onclick="deleteComment(${c.id})">삭제</button>
                    </div>
                </div>
            `).reverse().join(''); // 최신 댓글이 위로 오도록 reverse 적용
        }

        window.deleteComment = async function(id) {
            const data = getDataNode();
            const commentIndex = data.comments.findIndex(c => c.id === id);
            if(commentIndex === -1) return;

            const comment = data.comments[commentIndex];

            if(!isAdmin) {
                const pwd = prompt("댓글 삭제를 위해 작성 시 설정한 비밀번호를 입력해주세요:");
                if(pwd !== comment.password) {
                    if(pwd !== null) alert("비밀번호가 일치하지 않습니다.");
                    return;
                }
            }

            if(confirm("댓글을 정말 삭제하시겠습니까?")) {
                data.comments.splice(commentIndex, 1);
                try {
                    const docRef = doc(db, "exhibition", "photovoiceData");
                    await setDoc(docRef, exhibitionData);
                    window.renderComments();
                } catch (e) {
                    alert("삭제 중 오류가 발생했습니다.");
                }
            }
        }

        window.editComment = async function(id) {
            const data = getDataNode();
            const commentIndex = data.comments.findIndex(c => c.id === id);
            if(commentIndex === -1) return;

            const comment = data.comments[commentIndex];

            if(!isAdmin) {
                const pwd = prompt("댓글 수정을 위해 작성 시 설정한 비밀번호를 입력해주세요:");
                if(pwd !== comment.password) {
                    if(pwd !== null) alert("비밀번호가 일치하지 않습니다.");
                    return;
                }
            }

            const newText = prompt("수정할 댓글 내용을 입력해주세요 (최대 300자):", comment.text);
            if(newText !== null && newText.trim() !== "") {
                comment.text = newText.substring(0, 300); // 300자 제한 강제
                try {
                    const docRef = doc(db, "exhibition", "photovoiceData");
                    await setDoc(docRef, exhibitionData);
                    window.renderComments();
                } catch (e) {
                    alert("수정 중 오류가 발생했습니다.");
                }
            }
        }

        window.onload = loadDataFromFirebase;
    </script>
</body>
</html>
